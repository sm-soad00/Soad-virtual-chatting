<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💬 SOAD CHAT | রিয়েল টাইম চ্যাট</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Poppins', Roboto, sans-serif;
            background: linear-gradient(145deg, #0a0e27 0%, #1a1a3e 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 10px;
        }

        /* লগইন পেইজ */
        .login-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.5s ease;
        }

        .login-card {
            background: rgba(15, 25, 45, 0.95);
            backdrop-filter: blur(12px);
            padding: 40px 30px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            width: 350px;
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .login-card h1 {
            color: #ff6b35;
            font-size: 1.8rem;
            letter-spacing: 2px;
        }

        .login-card .sub {
            color: #a0aec0;
            margin-bottom: 25px;
            font-size: 0.8rem;
        }

        .login-card input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            border: 2px solid #2d3748;
            border-radius: 50px;
            font-size: 1rem;
            background: #1a202c;
            color: white;
            transition: 0.3s;
            outline: none;
            text-align: center;
        }

        .login-card input:focus {
            border-color: #ff6b35;
            box-shadow: 0 0 0 3px rgba(255,107,53,0.2);
        }

        .login-card button {
            background: linear-gradient(135deg, #ff6b35, #ff4500);
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: 0.3s;
        }

        .login-card button:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px rgba(255,107,53,0.4);
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 0.8rem;
            margin-top: 10px;
            display: none;
        }

        /* চ্যাট কন্টেইনার */
        .chat-container {
            display: flex;
            width: 100%;
            max-width: 1300px;
            height: 90vh;
            background: #0f172a;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: slideUp 0.5s ease;
        }

        /* সাইডবার */
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #0f172a 0%, #0a0f1f 100%);
            border-right: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #1e293b;
            text-align: center;
        }

        .sidebar-header h2 {
            color: #ff6b35;
            font-size: 1.6rem;
        }

        .user-info {
            padding: 15px;
            background: rgba(255,107,53,0.1);
            margin: 15px;
            border-radius: 20px;
            text-align: center;
        }

        .user-info .username-display {
            color: white;
            font-weight: bold;
            margin: 5px 0;
            font-size: 1.1rem;
        }

        .logout-btn {
            background: #ef4444;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        .online-section {
            flex: 1;
            padding: 15px;
        }

        .online-title {
            color: #94a3b8;
            font-size: 0.75rem;
            margin-bottom: 12px;
        }

        .online-users-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
        }

        .online-users-list li {
            padding: 10px 12px;
            margin: 5px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #e2e8f0;
            font-size: 0.9rem;
        }

        .online-users-list li:hover {
            background: rgba(255,107,53,0.2);
        }

        .online-users-list li.active {
            background: rgba(255,107,53,0.3);
            border-left: 3px solid #ff6b35;
        }

        /* মেইন চ্যাট এলাকা */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f172a;
        }

        .chat-header {
            padding: 15px 20px;
            background: #1a1f35;
            border-bottom: 1px solid #2d3748;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            color: white;
            font-size: 1.1rem;
        }

        .chat-header .chat-status {
            font-size: 0.65rem;
            color: #48bb78;
        }

        .back-btn {
            background: #2d3748;
            border: none;
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* মেসেজ এরিয়া */
        .messages-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #0f172a;
        }

        .message {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 20px;
            animation: fadeInMsg 0.2s ease;
            word-wrap: break-word;
        }

        .message.own {
            align-self: flex-end;
            background: linear-gradient(135deg, #ff6b35, #ff4500);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message.other {
            align-self: flex-start;
            background: #1e293b;
            color: #e2e8f0;
            border-bottom-left-radius: 5px;
        }

        .message .sender {
            font-size: 0.65rem;
            font-weight: bold;
            margin-bottom: 3px;
            display: block;
            color: #ff6b35;
        }

        .message small {
            font-size: 0.55rem;
            opacity: 0.7;
            display: block;
            margin-top: 4px;
        }

        .system-msg {
            text-align: center;
            font-size: 0.7rem;
            color: #64748b;
            padding: 6px;
            font-style: italic;
        }

        .typing-indicator {
            padding: 6px 20px;
            font-size: 0.7rem;
            color: #ff6b35;
            min-height: 30px;
            background: #0a0f1f;
            border-top: 1px solid #1e293b;
        }

        /* ইনপুট এলাকা - এখানে Send বাটন স্পষ্টভাবে আছে */
        .input-area {
            display: flex;
            padding: 15px 20px;
            gap: 12px;
            background: #0f172a;
            border-top: 1px solid #1e293b;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #2d3748;
            border-radius: 30px;
            font-size: 1rem;
            background: #1a202c;
            color: white;
            outline: none;
        }

        .input-area input:focus {
            border-color: #ff6b35;
        }

        .input-area button {
            background: linear-gradient(135deg, #ff6b35, #ff4500);
            border: none;
            padding: 12px 28px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }

        .input-area button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(255,107,53,0.3);
        }

        /* মোবাইল রেসপন্সিভ */
        @media (max-width: 700px) {
            .sidebar {
                width: 200px;
            }
            .message {
                max-width: 85%;
            }
            .input-area button {
                padding: 12px 20px;
                font-size: 0.9rem;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInMsg {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #ff6b35;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div id="loginPage" class="login-container">
    <div class="login-card">
        <div class="logo">💬🔥</div>
        <h1>SOAD CHAT</h1>
        <div class="sub">শুধু নাম দিলেই চ্যাট শুরু</div>
        <input type="text" id="loginUsername" placeholder="👤 আপনার নাম দিন" maxlength="20">
        <button onclick="doLogin()">🚀 চ্যাট শুরু করুন</button>
        <div id="loginError" class="error-msg">❌ দয়া করে আপনার নাম দিন!</div>
    </div>
</div>

<div id="chatPage" style="display: none;">
    <div class="chat-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>SOAD</h2>
            </div>
            <div class="user-info">
                <div class="username-display" id="currentUserName">-</div>
                <button class="logout-btn" onclick="doLogout()">🚪 লগআউট</button>
            </div>
            <div class="online-section">
                <div class="online-title">🟢 অনলাইন সদস্য (ক্লিক করলে প্রাইভেট চ্যাট)</div>
                <ul class="online-users-list" id="onlineUsersList"></ul>
            </div>
        </div>

        <div class="main-chat">
            <div class="chat-header">
                <div>
                    <h3 id="chatWithName">সকলের সাথে 💬</h3>
                    <div class="chat-status" id="chatStatus">পাবলিক চ্যাট</div>
                </div>
                <button class="back-btn" id="backToPublicBtn" style="display: none;" onclick="switchToPublic()">🌍 পাবলিকে যান</button>
            </div>

            <div class="messages-area" id="messagesArea">
                <div class="system-msg">✨ SOAD চ্যাটে স্বাগতম! নিচে মেসেজ লিখুন...</div>
            </div>

            <div class="typing-indicator" id="typingIndicator"></div>

            <div class="input-area">
                <input type="text" id="messageInput" placeholder="📝 মেসেজ লিখুন..." autocomplete="off">
                <button id="sendBtn">📨 পাঠান</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ======================== গ্লোবাল ভেরিয়েবল ========================
    let currentUser = null;
    let currentChatWith = null;
    let typingTimeout = null;
    let refreshInterval = null;
    let onlineUsers = [];
    let allMessages = [];
    
    // ======================== ডাটা ফাংশন ========================
    function loadMessages() {
        const saved = localStorage.getItem("soad_messages_final");
        if(saved) {
            allMessages = JSON.parse(saved);
        } else {
            allMessages = [];
        }
    }
    
    function saveMessages() {
        localStorage.setItem("soad_messages_final", JSON.stringify(allMessages));
    }
    
    function loadOnlineUsers() {
        const saved = localStorage.getItem("soad_online_final");
        if(saved) {
            onlineUsers = JSON.parse(saved);
        } else {
            onlineUsers = [];
        }
    }
    
    function saveOnlineUsers() {
        localStorage.setItem("soad_online_final", JSON.stringify(onlineUsers));
    }
    
    // ======================== লগইন ========================
    function doLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        
        if(username === "") {
            document.getElementById('loginError').style.display = 'block';
            setTimeout(() => {
                document.getElementById('loginError').style.display = 'none';
            }, 2000);
            return;
        }
        
        currentUser = username;
        
        loadOnlineUsers();
        if(!onlineUsers.includes(currentUser)) {
            onlineUsers.push(currentUser);
        }
        saveOnlineUsers();
        
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('chatPage').style.display = 'flex';
        document.getElementById('currentUserName').innerText = currentUser;
        
        loadMessages();
        startRealTime();
        addSystemMessage(`✨ ${currentUser} চ্যাটে জয়েন করেছেন!`);
        updateOnlineList();
        renderMessages();
    }
    
    function doLogout() {
        if(currentUser) {
            loadOnlineUsers();
            onlineUsers = onlineUsers.filter(u => u !== currentUser);
            saveOnlineUsers();
            addSystemMessage(`👋 ${currentUser} চ্যাট ছেড়ে গেছেন`);
        }
        
        currentUser = null;
        currentChatWith = null;
        
        if(refreshInterval) {
            clearInterval(refreshInterval);
        }
        
        document.getElementById('loginPage').style.display = 'flex';
        document.getElementById('chatPage').style.display = 'none';
        document.getElementById('loginUsername').value = '';
    }
    
    // ======================== অনলাইন লিস্ট ========================
    function updateOnlineList() {
        loadOnlineUsers();
        const otherUsers = onlineUsers.filter(u => u !== currentUser);
        
        const listHtml = otherUsers.map(user => `
            <li onclick="startPrivateChat('${user}')" class="${currentChatWith === user ? 'active' : ''}">
                🟢 ${user}
            </li>
        `).join('');
        
        document.getElementById('onlineUsersList').innerHTML = listHtml || '<li style="opacity:0.6;">😴 কেউ অনলাইনে নেই</li>';
    }
    
    // ======================== চ্যাট মোড ========================
    function startPrivateChat(username) {
        currentChatWith = username;
        document.getElementById('chatWithName').innerHTML = `${username} 🔒`;
        document.getElementById('chatStatus').innerHTML = 'প্রাইভেট চ্যাট';
        document.getElementById('backToPublicBtn').style.display = 'block';
        renderMessages();
    }
    
    function switchToPublic() {
        currentChatWith = null;
        document.getElementById('chatWithName').innerHTML = 'সকলের সাথে 💬';
        document.getElementById('chatStatus').innerHTML = 'পাবলিক চ্যাট';
        document.getElementById('backToPublicBtn').style.display = 'none';
        renderMessages();
    }
    
    // ======================== মেসেজ রেন্ডার ========================
    function renderMessages() {
        const messagesDiv = document.getElementById('messagesArea');
        
        let filtered = [];
        if(currentChatWith === null) {
            filtered = allMessages.filter(m => m.type === 'public');
        } else {
            filtered = allMessages.filter(m => 
                m.type === 'private' && 
                ((m.from === currentUser && m.to === currentChatWith) ||
                 (m.from === currentChatWith && m.to === currentUser))
            );
        }
        
        filtered.sort((a,b) => a.timestamp - b.timestamp);
        
        messagesDiv.innerHTML = '';
        if(filtered.length === 0) {
            messagesDiv.innerHTML = '<div class="system-msg">💬 কোনো মেসেজ নেই। প্রথম মেসেজ পাঠান!</div>';
        }
        
        filtered.forEach(msg => {
            const isOwn = (msg.from === currentUser);
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : 'other'}`;
            
            if(!isOwn) {
                const nameSpan = document.createElement('span');
                nameSpan.className = 'sender';
                nameSpan.innerText = msg.from;
                div.appendChild(nameSpan);
            }
            
            const textSpan = document.createElement('span');
            textSpan.innerText = msg.text;
            div.appendChild(textSpan);
            
            const timeSpan = document.createElement('small');
            timeSpan.innerText = msg.time;
            div.appendChild(timeSpan);
            
            messagesDiv.appendChild(div);
        });
        
        scrollToBottom();
    }
    
    function addSystemMessage(text) {
        const messagesDiv = document.getElementById('messagesArea');
        const div = document.createElement('div');
        div.className = 'system-msg';
        div.innerText = `📢 ${text}`;
        messagesDiv.appendChild(div);
        scrollToBottom();
    }
    
    // ======================== মেসেজ পাঠানো ========================
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if(text === "") return;
        
        const now = new Date();
        const timeString = now.toLocaleTimeString('bn-BD', { hour: '2-digit', minute: '2-digit' });
        
        const newMsg = {
            id: Date.now(),
            from: currentUser,
            to: currentChatWith || 'public',
            text: text,
            time: timeString,
            timestamp: Date.now(),
            type: currentChatWith === null ? 'public' : 'private'
        };
        
        allMessages.push(newMsg);
        saveMessages();
        
        input.value = "";
        renderMessages();
        
        if(typingTimeout) clearTimeout(typingTimeout);
    }
    
    // ======================== টাইপিং ========================
    function setTyping(isTyping) {
        if(!currentChatWith) return;
        const typingKey = `typing_${currentChatWith}_to_${currentUser}`;
        if(isTyping) {
            localStorage.setItem(typingKey, Date.now().toString());
        } else {
            localStorage.removeItem(typingKey);
        }
    }
    
    function checkTyping() {
        if(!currentChatWith) {
            document.getElementById('typingIndicator').innerHTML = '';
            return;
        }
        
        const typingKey = `typing_${currentChatWith}_to_${currentUser}`;
        const typingTime = localStorage.getItem(typingKey);
        if(typingTime && (Date.now() - parseInt(typingTime)) < 2000) {
            document.getElementById('typingIndicator').innerHTML = `✍️ ${currentChatWith} টাইপ করছেন...`;
        } else {
            document.getElementById('typingIndicator').inner
