<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💬 SOAD CHAT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* লগইন পেজ - মোবাইল ফ্রেন্ডলি */
        .login-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #0a0e27 0%, #1a1a3e 100%);
            padding: 20px;
        }

        .login-card {
            background: rgba(15, 25, 45, 0.95);
            padding: 40px 25px;
            border-radius: 35px;
            text-align: center;
            width: 90%;
            max-width: 340px;
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .login-card h1 {
            color: #ff6b35;
            font-size: 1.8rem;
        }

        .login-card .sub {
            color: #94a3b8;
            font-size: 0.8rem;
            margin-bottom: 25px;
        }

        .login-card input {
            width: 100%;
            padding: 15px;
            border: 2px solid #2d3748;
            border-radius: 50px;
            font-size: 1rem;
            background: #1a202c;
            color: white;
            text-align: center;
            outline: none;
            margin: 10px 0;
        }

        .login-card input:focus {
            border-color: #ff6b35;
        }

        .login-card button {
            background: linear-gradient(135deg, #ff6b35, #ff4500);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 0.75rem;
            margin-top: 10px;
            display: none;
        }

        /* চ্যাট পেজ - মোবাইল ফুলস্ক্রিন */
        .chat-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #0f172a;
        }

        /* হেডার - মোবাইলের জন্য সিম্পল */
        .chat-header {
            background: #1a1f35;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2d3748;
        }

        .menu-btn {
            background: #2d3748;
            border: none;
            color: white;
            font-size: 1.3rem;
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
        }

        .chat-title {
            text-align: center;
            flex: 1;
        }

        .chat-title h3 {
            color: white;
            font-size: 1rem;
        }

        .chat-title .status {
            font-size: 0.6rem;
            color: #48bb78;
        }

        .back-btn {
            background: #2d3748;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        /* মেসেজ এরিয়া */
        .messages-area {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #0f172a;
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.own {
            align-self: flex-end;
            background: linear-gradient(135deg, #ff6b35, #ff4500);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.other {
            align-self: flex-start;
            background: #1e293b;
            color: #e2e8f0;
            border-bottom-left-radius: 4px;
        }

        .message .sender {
            font-size: 0.6rem;
            font-weight: bold;
            margin-bottom: 3px;
            display: block;
            color: #ffaa88;
        }

        .message small {
            font-size: 0.5rem;
            opacity: 0.7;
            display: block;
            margin-top: 4px;
        }

        .system-msg {
            text-align: center;
            font-size: 0.65rem;
            color: #64748b;
            padding: 6px;
            font-style: italic;
        }

        .typing-indicator {
            padding: 5px 16px;
            font-size: 0.65rem;
            color: #ff6b35;
            min-height: 28px;
            background: #0a0f1f;
            border-top: 1px solid #1e293b;
        }

        /* ইনপুট এলাকা - মোবাইলের জন্য বড় বাটন */
        .input-area {
            display: flex;
            padding: 10px 12px;
            gap: 8px;
            background: #0f172a;
            border-top: 1px solid #1e293b;
        }

        .input-area input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #2d3748;
            border-radius: 30px;
            font-size: 1rem;
            background: #1a202c;
            color: white;
            outline: none;
        }

        .input-area input:focus {
            border-color: #ff6b35;
        }

        .input-area button {
            background: linear-gradient(135deg, #ff6b35, #ff4500);
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            white-space: nowrap;
        }

        /* সাইডবার - মোবাইলে স্লাইডার */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 98;
            display: none;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 75%;
            max-width: 260px;
            height: 100%;
            background: linear-gradient(180deg, #0f172a 0%, #0a0f1f 100%);
            z-index: 99;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 20px rgba(0,0,0,0.3);
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #1e293b;
            text-align: center;
        }

        .sidebar-header h2 {
            color: #ff6b35;
            font-size: 1.5rem;
        }

        .user-info {
            padding: 15px;
            background: rgba(255,107,53,0.1);
            margin: 15px;
            border-radius: 20px;
            text-align: center;
        }

        .user-info .username-display {
            color: white;
            font-weight: bold;
            font-size: 1rem;
            word-break: break-all;
        }

        .logout-btn {
            background: #ef4444;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 25px;
            width: 100%;
            margin-top: 10px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .online-section {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .online-title {
            color: #94a3b8;
            font-size: 0.7rem;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #1e293b;
        }

        .online-users-list {
            list-style: none;
        }

        .online-users-list li {
            padding: 12px;
            margin: 5px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #e2e8f0;
            font-size: 0.9rem;
        }

        .online-users-list li:active {
            background: rgba(255,107,53,0.3);
        }

        .online-users-list li.active {
            background: rgba(255,107,53,0.3);
            border-left: 3px solid #ff6b35;
        }

        /* স্ক্রলবার */
        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #ff6b35;
        }
    </style>
</head>
<body>

<div id="loginPage" class="login-container">
    <div class="login-card">
        <div class="logo">💬🔥</div>
        <h1>SOAD CHAT</h1>
        <div class="sub">নাম দিয়ে চ্যাট শুরু করুন</div>
        <input type="text" id="loginUsername" placeholder="আপনার নাম" maxlength="20">
        <button onclick="doLogin()">চ্যাট শুরু করুন</button>
        <div id="loginError" class="error-msg">নাম লিখুন!</div>
    </div>
</div>

<div id="chatPage" style="display: none;">
    <div class="chat-container">
        <div class="chat-header">
            <button class="menu-btn" onclick="openSidebar()">☰</button>
            <div class="chat-title">
                <h3 id="chatWithName">সকলের সাথে</h3>
                <div class="status" id="chatStatus">পাবলিক চ্যাট</div>
            </div>
            <button class="back-btn" id="backToPublicBtn" style="display: none;" onclick="switchToPublic()">পাবলিকে</button>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="system-msg">✨ স্বাগতম! নিচে মেসেজ লিখুন</div>
        </div>

        <div class="typing-indicator" id="typingIndicator"></div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="মেসেজ লিখুন..." autocomplete="off">
            <button id="sendBtn">পাঠান</button>
        </div>
    </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h2>SOAD</h2>
    </div>
    <div class="user-info">
        <div class="username-display" id="currentUserName">-</div>
        <button class="logout-btn" onclick="doLogout()">লগআউট</button>
    </div>
    <div class="online-section">
        <div class="online-title">🟢 অনলাইন সদস্য</div>
        <ul class="online-users-list" id="onlineUsersList"></ul>
    </div>
</div>

<script>
    let currentUser = null;
    let currentChatWith = null;
    let typingTimeout = null;
    let refreshInterval = null;
    let onlineUsers = [];
    let allMessages = [];
    
    function loadMessages() {
        const saved = localStorage.getItem("soad_messages_mobile");
        if(saved) {
            allMessages = JSON.parse(saved);
        } else {
            allMessages = [];
        }
    }
    
    function saveMessages() {
        localStorage.setItem("soad_messages_mobile", JSON.stringify(allMessages));
    }
    
    function loadOnlineUsers() {
        const saved = localStorage.getItem("soad_online_mobile");
        if(saved) {
            onlineUsers = JSON.parse(saved);
        } else {
            onlineUsers = [];
        }
    }
    
    function saveOnlineUsers() {
        localStorage.setItem("soad_online_mobile", JSON.stringify(onlineUsers));
    }
    
    function openSidebar() {
        document.getElementById('sidebar').classList.add('open');
        document.getElementById('sidebarOverlay').style.display = 'block';
    }
    
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').style.display = 'none';
    }
    
    function doLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        
        if(username === "") {
            document.getElementById('loginError').style.display = 'block';
            setTimeout(() => {
                document.getElementById('loginError').style.display = 'none';
            }, 2000);
            return;
        }
        
        currentUser = username;
        
        loadOnlineUsers();
        if(!onlineUsers.includes(currentUser)) {
            onlineUsers.push(currentUser);
        }
        saveOnlineUsers();
        
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('chatPage').style.display = 'flex';
        document.getElementById('currentUserName').innerText = currentUser;
        
        loadMessages();
        startRealTime();
        addSystemMessage(currentUser + " চ্যাটে যোগ দিয়েছেন");
        updateOnlineList();
        renderMessages();
    }
    
    function doLogout() {
        if(currentUser) {
            loadOnlineUsers();
            onlineUsers = onlineUsers.filter(u => u !== currentUser);
            saveOnlineUsers();
            addSystemMessage(currentUser + " চ্যাট ছেড়ে গেছেন");
        }
        
        currentUser = null;
        currentChatWith = null;
        
        if(refreshInterval) {
            clearInterval(refreshInterval);
        }
        
        document.getElementById('loginPage').style.display = 'flex';
        document.getElementById('chatPage').style.display = 'none';
        document.getElementById('loginUsername').value = '';
        closeSidebar();
    }
    
    function updateOnlineList() {
        loadOnlineUsers();
        const otherUsers = onlineUsers.filter(u => u !== currentUser);
        
        const listHtml = otherUsers.map(user => `
            <li onclick="startPrivateChat('${user}'); closeSidebar();">
                🟢 ${user}
            </li>
        `).join('');
        
        document.getElementById('onlineUsersList').innerHTML = listHtml || '<li style="opacity:0.6;">😴 কেউ অনলাইনে নেই</li>';
    }
    
    function startPrivateChat(username) {
        currentChatWith = username;
        document.getElementById('chatWithName').innerHTML = username;
        document.getElementById('chatStatus').innerHTML = 'প্রাইভেট চ্যাট';
        document.getElementById('backToPublicBtn').style.display = 'block';
        renderMessages();
    }
    
    function switchToPublic() {
        currentChatWith = null;
        document.getElementById('chatWithName').innerHTML = 'সকলের সাথে';
        document.getElementById('chatStatus').innerHTML = 'পাবলিক চ্যাট';
        document.getElementById('backToPublicBtn').style.display = 'none';
        renderMessages();
    }
    
    function renderMessages() {
        const messagesDiv = document.getElementById('messagesArea');
        
        let filtered = [];
        if(currentChatWith === null) {
            filtered = allMessages.filter(m => m.type === 'public');
        } else {
            filtered = allMessages.filter(m => 
                m.type === 'private' && 
                ((m.from === currentUser && m.to === currentChatWith) ||
                 (m.from === currentChatWith && m.to === currentUser))
            );
        }
        
        filtered.sort((a,b) => a.timestamp - b.timestamp);
        
        messagesDiv.innerHTML = '';
        if(filtered.length === 0) {
            messagesDiv.innerHTML = '<div class="system-msg">💬 কোনো মেসেজ নেই</div>';
        }
        
        filtered.forEach(msg => {
            const isOwn = (msg.from === currentUser);
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : 'other'}`;
            
            if(!isOwn) {
                const nameSpan = document.createElement('span');
                nameSpan.className = 'sender';
                nameSpan.innerText = msg.from;
                div.appendChild(nameSpan);
            }
            
            const textSpan = document.createElement('span');
            textSpan.innerText = msg.text;
            div.appendChild(textSpan);
            
            const timeSpan = document.createElement('small');
            timeSpan.innerText = msg.time;
            div.appendChild(timeSpan);
            
            messagesDiv.appendChild(div);
        });
        
        scrollToBottom();
    }
    
    function addSystemMessage(text) {
        const messagesDiv = document.getElementById('messagesArea');
        const div = document.createElement('div');
        div.className = 'system-msg';
        div.innerText = "📢 " + text;
        messagesDiv.appendChild(div);
        scrollToBottom();
    }
    
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if(text === "") return;
        
        const now = new Date();
        const hours = now.getHours().toString().padStart(2,'0');
        const minutes = now.getMinutes().toString().padStart(2,'0');
        const timeString = hours + ":" + minutes;
        
        const newMsg = {
            id: Date.now(),
            from: currentUser,
            to: currentChatWith || 'public',
            text: text,
            time: timeString,
            timestamp: Date.now(),
            type: currentChatWith === null ? 'public' : 'private'
        };
        
        allMessages.push(newMsg);
        saveMessages();
        
        input.value = "";
        renderMessages();
        
        if(typingTimeout) clearTimeout(typingTimeout);
    }
    
    function setTyping(isTyping) {
        if(!currentChatWith) return;
        const typingKey = "typing_" + currentChatWith + "_to_" + currentUser;
        if(isTyping) {
            localStorage.setItem(typingKey, Date.now().toString());
        } else {
            localStorage.removeItem(typingKey);
        }
    }
    
    function checkTyping() {
        if(!currentChatWith) {
            document.getElementById('typingIndicator').innerHTML = '';
            return;
        }
        
        const typingKey = "typing_" + currentChatWith + "_to_" + currentUser;
        const typingTime = localStorage.getItem(typingKey);
        if(typingTime && (Date.now() - parseInt(typingTime)) < 2000) {
            document.getElementById('typingIndicator').innerHTML = "✍️ " + currentChatWith + " টাইপ করছেন...";
        } else {
            document.getElementById('typingIndicator').innerHTML = '';
        }
    }
    
    function startRealTime() {
        if(refreshInterval) clearInterval(refreshInterval);
        
        refreshInterval = setInterval(() => {
            if(currentUser) {
                loadOnlineUsers();
                if(!onlineUsers.includes(currentUser)) {
                    onlineUsers.push(currentUser);
                    saveOnlineUsers();
                }
                updateOnlineList();
                loadMessages();
                renderMessages();
                checkTyping();
            }
        }, 500);
        
        setInterval(() => {
            if(currentUser) {
                loadOnlineUsers();
                if(!onlineUsers.includes(currentUser)) {
                    onlineUsers.push(currentUser);
                    saveOnlineUsers();
                }
            }
        }, 10000);
        
        window.addEventListener('storage', (e) => {
            if(e.key === 'soad_messages_mobile' || e.key === 'soad_online_mobile') {
                loadMessages();
                updateOnlineList();
                renderMessages();
            }
            if(e.key && e.key.startsWith('typing_')) {
                checkTyping();
            }
        });
    }
    
    function scrollToBottom() {
        const area = document.getElementById('messagesArea');
        setTimeout(() => {
            area.scrollTop = area.scrollHeight;
        }, 100);
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        loadMessages();
        loadOnlineUsers();
        
        const sendBtn = document.getElementById('sendBtn');
        const messageInput = document.getElementById('messageInput');
        
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMessage();
        });
        
        messageInput.addEventListener('input', () => {
            setTyping(true);
            if(typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                setTyping(false);
            }, 1500);
        });
    });
    
    window.doLogin = doLogin;
    window.doLogout = doLogout;
    window.startPrivateChat = startPrivateChat;
    window.switchToPublic = switchToPublic;
    window.openSidebar = openSidebar;
    window.closeSidebar = closeSidebar;
</script>
</body>
</html>
